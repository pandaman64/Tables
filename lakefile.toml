name = "Tables"
version = "0.1.0"
defaultTargets = ["Tables"]
testDriver = "TablesExamples"

[leanOptions]
autoImplicit = false

[[require]]
name = "batteries"
scope = "leanprover-community"
rev = "main"

[[lean_lib]]
name = "Tables"

# `lake test` builds this library; failures are elaboration errors in the examples.
[[lean_lib]]
name = "TablesExamples"
globs = ["Examples.+"]
needs = ["Tables"]
